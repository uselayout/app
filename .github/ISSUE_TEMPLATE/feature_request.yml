name: Feature Request
description: Suggest a feature for SuperDuper AI Studio
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe what you'd like.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like this to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any other approaches you've considered?

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Extraction (Website)
        - Extraction (Figma)
        - DESIGN.md Generation
        - Test Panel
        - Export Formats
        - UI / UX
        - API
        - Other
