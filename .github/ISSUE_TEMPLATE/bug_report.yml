name: Bug Report
description: Report a bug in Layout
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the sections below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this bug?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: dropdown
    id: extraction-type
    attributes:
      label: Extraction Type
      options:
        - Website
        - Figma
        - layout.md Generation
        - Test Panel
        - Export
        - Other

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Browser, OS, Node version, self-hosted or cloud?
      placeholder: |
        - Browser: Chrome 130
        - OS: macOS 15
        - Node: 20.x
        - Deployment: Self-hosted / Cloud

  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots
      description: Paste any relevant error messages, console logs, or screenshots.
